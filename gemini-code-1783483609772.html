<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maximalist Labs Portal</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#050505]">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef } = React;

        // --- Bulletproof Inline Icons ---
        const Activity = ({ size, className }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>;
        const Bluetooth = ({ size, className }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m7 7 10 10-5 5V2l5 5-10 10"/></svg>;
        const BluetoothOff = ({ size, className }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m17 17-5 5V12l-5 5"/><path d="m2 2 20 20"/><path d="M14.5 9.5 12 7V2l5 5-2.5 2.5"/></svg>;
        const MessageSquare = ({ size, className }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>;
        const Send = ({ size, className }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>;
        const Cpu = ({ size, className }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="16" height="16" x="4" y="4" rx="2"/><rect width="6" height="6" x="9" y="9" rx="1"/><path d="M15 2v2"/><path d="M15 20v2"/><path d="M2 15h2"/><path d="M2 9h2"/><path d="M20 15h2"/><path d="M20 9h2"/><path d="M9 2v2"/><path d="M9 20v2"/></svg>;
        const Atom = ({ size, className }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="1"/><path d="M20.2 20.2c2.04-2.03.02-7.36-4.5-11.9-4.54-4.52-9.87-6.54-11.9-4.5-2.04 2.03-.02 7.36 4.5 11.9 4.54 4.52 9.87 6.54 11.9 4.5Z"/><path d="M15.7 4.3c3.08-1.04 6.44-.06 7.5 2.14 1.05 2.2-1.04 5.92-4.13 6.96-3.08 1.04-6.44.06-7.5-2.14-1.05-2.2 1.04-5.92 4.13-6.96Z"/><path d="M4.3 15.7c-3.08 1.04-6.44.06-7.5-2.14-1.05-2.2 1.04-5.92 4.13-6.96 3.08-1.04 6.44-.06 7.5 2.14 1.05 2.2-1.04 5.92-4.13 6.96Z"/></svg>;

        // --- BLE UUIDs ---
        const SERVICE_UUID = "19b10000-e8f2-537e-4f6c-d104768a1214";
        const CHAR_TEXT_UUID = "19b10001-e8f2-537e-4f6c-d104768a1214";
        const CHAR_CMD_UUID = "19b10002-e8f2-537e-4f6c-d104768a1214";

        function App() {
            const [connectionStatus, setConnectionStatus] = useState('DISCONNECTED'); 
            const [inputText, setInputText] = useState('');
            
            const bleDeviceRef = useRef(null);
            const textCharRef = useRef(null);
            const cmdCharRef = useRef(null);

            // --- BLE Logic ---
            const handleDisconnect = () => {
                console.log('Device disconnected');
                setConnectionStatus('DISCONNECTED');
                bleDeviceRef.current = null;
            };

            const connectBLE = async () => {
                try {
                    setConnectionStatus('CONNECTING');
                    
                    const device = await navigator.bluetooth.requestDevice({
                        filters: [{ name: 'MAXIMALIST-KEY' }],
                        optionalServices: [SERVICE_UUID]
                    });

                    device.addEventListener('gattserverdisconnected', handleDisconnect);
                    bleDeviceRef.current = device;

                    const server = await device.gatt.connect();
                    const service = await server.getPrimaryService(SERVICE_UUID);
                    
                    textCharRef.current = await service.getCharacteristic(CHAR_TEXT_UUID);
                    cmdCharRef.current = await service.getCharacteristic(CHAR_CMD_UUID);

                    setConnectionStatus('CONNECTED');
                } catch (error) {
                    console.error("Connection failed!", error);
                    setConnectionStatus('DISCONNECTED');
                }
            };

            const disconnectBLE = () => {
                if (bleDeviceRef.current && bleDeviceRef.current.gatt.connected) {
                    bleDeviceRef.current.gatt.disconnect();
                }
            };

            const sendText = async () => {
                if (!textCharRef.current || !inputText) return;
                try {
                    const encoder = new TextEncoder();
                    await textCharRef.current.writeValue(encoder.encode(inputText));
                    setInputText(''); 
                } catch (error) {
                    console.error("Failed to send text", error);
                }
            };

            const sendCommand = async (cmdValue) => {
                if (!cmdCharRef.current) return;
                try {
                    const encoder = new TextEncoder();
                    await cmdCharRef.current.writeValue(encoder.encode(cmdValue.toString()));
                } catch (error) {
                    console.error("Failed to send command", error);
                }
            };

            // --- UI Helpers ---
            const isConnected = connectionStatus === 'CONNECTED';
            
            const statusStyles = {
                'DISCONNECTED': { color: 'bg-red-500', shadow: 'shadow-[0_0_15px_rgba(239,68,68,0.8)]', text: 'DISCONNECTED' },
                'CONNECTING': { color: 'bg-yellow-500', shadow: 'shadow-[0_0_15px_rgba(234,179,8,0.8)]', text: 'CONNECTING...', extra: 'animate-pulse' },
                'CONNECTED': { color: 'bg-cyan-400', shadow: 'shadow-[0_0_15px_rgba(34,211,238,0.8)]', text: 'LINK ESTABLISHED' },
            };

            const currentStatus = statusStyles[connectionStatus];

            return (
                <div className="min-h-screen text-[#ededed] font-sans flex flex-col items-center p-6 selection:bg-cyan-500 selection:text-white">
                    
                    {/* Header */}
                    <header className="w-full max-w-md text-center mt-8 mb-10">
                        <h1 className="text-3xl font-bold tracking-widest text-white uppercase flex items-center justify-center gap-3">
                            <Activity className="text-cyan-400" size={28} />
                            Maximalist
                        </h1>
                        <p className="text-cyan-400 font-mono text-sm tracking-[0.3em] mt-1">SYSTEM_PORTAL</p>
                    </header>

                    <main className="w-full max-w-md space-y-6">
                        
                        {/* Connection Status Panel */}
                        <div className="bg-[#1e1e1e]/60 backdrop-blur-md border border-white/10 rounded-2xl p-6 flex flex-col items-center shadow-xl">
                            <div className={`w-4 h-4 rounded-full ${currentStatus.color} ${currentStatus.shadow} ${currentStatus.extra || ''} mb-4 transition-all duration-300`}></div>
                            <p className="text-sm font-mono text-gray-400 mb-4">{currentStatus.text}</p>
                            
                            {!isConnected ? (
                                <button 
                                    onClick={connectBLE}
                                    disabled={connectionStatus === 'CONNECTING'}
                                    className="w-full bg-cyan-600 hover:bg-cyan-500 disabled:bg-cyan-800 disabled:cursor-not-allowed text-white font-bold py-3 px-4 rounded-xl transition-all shadow-[0_0_20px_rgba(8,145,178,0.4)] uppercase tracking-wider flex items-center justify-center gap-2"
                                >
                                    <Bluetooth size={20} />
                                    Establish Link
                                </button>
                            ) : (
                                <button 
                                    onClick={disconnectBLE}
                                    className="w-full bg-red-900/50 hover:bg-red-800/50 border border-red-500/30 text-red-200 font-bold py-3 px-4 rounded-xl transition-all uppercase tracking-wider flex items-center justify-center gap-2 mt-2"
                                >
                                    <BluetoothOff size={20} />
                                    Sever Link
                                </button>
                            )}
                        </div>

                        {/* Controls Panel */}
                        <div className={`space-y-6 transition-all duration-500 ${!isConnected ? 'opacity-30 pointer-events-none grayscale' : 'opacity-100'}`}>
                                
                            {/* Send Text */}
                            <div className="bg-[#1e1e1e]/60 backdrop-blur-md border border-white/10 rounded-2xl p-6 shadow-xl">
                                <h2 className="text-xs font-mono text-cyan-400 mb-3 uppercase tracking-widest flex items-center gap-2">
                                    <MessageSquare size={14} /> Push Message
                                </h2>
                                <div className="flex gap-2">
                                    <input 
                                        type="text" 
                                        maxLength="24" 
                                        value={inputText}
                                        onChange={(e) => setInputText(e.target.value)}
                                        onKeyDown={(e) => e.key === 'Enter' && sendText()}
                                        placeholder="Enter text..." 
                                        className="w-full bg-black/50 border border-gray-700 rounded-xl px-4 py-3 focus:outline-none focus:border-cyan-500 text-white placeholder-gray-600 font-mono"
                                    />
                                    <button 
                                        onClick={sendText}
                                        className="bg-gray-800 hover:bg-gray-700 text-white px-5 rounded-xl transition-all flex items-center justify-center border border-gray-700 hover:border-cyan-500"
                                    >
                                        <Send size={20} />
                                    </button>
                                </div>
                            </div>

                            {/* Face Selector */}
                            <div className="bg-[#1e1e1e]/60 backdrop-blur-md border border-white/10 rounded-2xl p-6 shadow-xl">
                                <h2 className="text-xs font-mono text-cyan-400 mb-3 uppercase tracking-widest flex items-center gap-2">
                                    <Cpu size={14} /> Active UI Module
                                </h2>
                                <div className="grid grid-cols-2 gap-3">
                                    <button 
                                        onClick={() => sendCommand(0)}
                                        className="bg-gray-800/80 hover:bg-gray-700 border border-transparent hover:border-cyan-500 rounded-xl py-4 flex flex-col items-center gap-2 transition-all group"
                                    >
                                        <Atom className="text-cyan-400 group-hover:scale-110 transition-transform" size={24} />
                                        <span className="text-xs font-mono text-gray-300 group-hover:text-white">BRAND LOGO</span>
                                    </button>
                                    
                                    <button 
                                        onClick={() => sendCommand(1)}
                                        className="bg-gray-800/80 hover:bg-gray-700 border border-transparent hover:border-magenta-500 rounded-xl py-4 flex flex-col items-center gap-2 transition-all group"
                                    >
                                        <MessageSquare className="text-magenta-400 group-hover:scale-110 transition-transform" size={24} />
                                        <span className="text-xs font-mono text-gray-300 group-hover:text-white">TEXT BUFFER</span>
                                    </button>
                                    
                                    <button 
                                        onClick={() => sendCommand(2)}
                                        className="bg-gray-800/80 hover:bg-gray-700 border border-transparent hover:border-orange-500 rounded-xl py-4 flex flex-col items-center gap-2 transition-all col-span-2 group"
                                    >
                                        <Cpu className="text-orange-400 group-hover:scale-110 transition-transform" size={24} />
                                        <span className="text-xs font-mono text-gray-300 group-hover:text-white">SYSTEM TELEMETRY</span>
                                    </button>
                                </div>
                            </div>

                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
