<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maximalist Labs Portal</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#050505]">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef } = React;

        // --- Bulletproof Inline Icons ---
        const Activity = ({ size, className }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>;
        const Bluetooth = ({ size, className }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m7 7 10 10-5 5V2l5 5-10 10"/></svg>;
        const BluetoothOff = ({ size, className }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m17 17-5 5V12l-5 5"/><path d="m2 2 20 20"/><path d="M14.5 9.5 12 7V2l5 5-2.5 2.5"/></svg>;
        const MessageSquare = ({ size, className }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>;
        const Send = ({ size, className }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>;
        const Cpu = ({ size, className }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="16" height="16" x="4" y="4" rx="2"/><rect width="6" height="6" x="9" y="9" rx="1"/><path d="M15 2v2"/><path d="M15 20v2"/><path d="M2 15h2"/><path d="M2 9h2"/><path d="M20 15h2"/><path d="M20 9h2"/><path d="M9 2v2"/><path d="M9 20v2"/></svg>;
        const ImageUploadIcon = ({ size, className }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>;
        
        // --- Emotion Icons ---
        const FaceNeutral = ({ size, className }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 9h.01M16 9h.01M8 15h8"/></svg>;
        const FaceHappy = ({ size, className }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 9l1-1 1 1M16 9l-1-1-1 1M8 14s1.5 2 4 2 4-2 4-2"/></svg>;
        const FaceSleepy = ({ size, className }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>;
        const FaceAngry = ({ size, className }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 9l2 1M16 9l-2 1M8 15h8"/></svg>;
        const FaceVisor = ({ size, className }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="8" width="18" height="8" rx="2"/><circle cx="12" cy="12" r="2"/></svg>;
        const FaceOptics = ({ size, className }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/><path d="M12 2v20M2 12h20"/></svg>;

        // --- BLE UUIDs ---
        const SERVICE_UUID = "19b10000-e8f2-537e-4f6c-d104768a1214";
        const CHAR_TEXT_UUID = "19b10001-e8f2-537e-4f6c-d104768a1214";
        const CHAR_CMD_UUID  = "19b10002-e8f2-537e-4f6c-d104768a1214";
        const CHAR_IMG_UUID  = "19b10003-e8f2-537e-4f6c-d104768a1214"; // New Image Stream Channel

        function App() {
            const [connectionStatus, setConnectionStatus] = useState('DISCONNECTED'); 
            const [inputText, setInputText] = useState('');
            const [isUploading, setIsUploading] = useState(false);
            
            const bleDeviceRef = useRef(null);
            const textCharRef = useRef(null);
            const cmdCharRef = useRef(null);
            const imgCharRef = useRef(null);
            const fileInputRef = useRef(null);

            // --- BLE Logic ---
            const handleDisconnect = () => {
                console.log('Device disconnected');
                setConnectionStatus('DISCONNECTED');
                bleDeviceRef.current = null;
            };

            const connectBLE = async () => {
                try {
                    setConnectionStatus('CONNECTING');
                    
                    const device = await navigator.bluetooth.requestDevice({
                        filters: [{ name: 'MAXIMALIST-KEY' }],
                        optionalServices: [SERVICE_UUID]
                    });

                    device.addEventListener('gattserverdisconnected', handleDisconnect);
                    bleDeviceRef.current = device;

                    const server = await device.gatt.connect();
                    const service = await server.getPrimaryService(SERVICE_UUID);
                    
                    textCharRef.current = await service.getCharacteristic(CHAR_TEXT_UUID);
                    cmdCharRef.current = await service.getCharacteristic(CHAR_CMD_UUID);
                    imgCharRef.current = await service.getCharacteristic(CHAR_IMG_UUID);

                    setConnectionStatus('CONNECTED');
                } catch (error) {
                    console.error("Connection failed!", error);
                    setConnectionStatus('DISCONNECTED');
                }
            };

            const disconnectBLE = () => {
                if (bleDeviceRef.current && bleDeviceRef.current.gatt.connected) {
                    bleDeviceRef.current.gatt.disconnect();
                }
            };

            const sendText = async () => {
                if (!textCharRef.current || !inputText) return;
                try {
                    const encoder = new TextEncoder();
                    await textCharRef.current.writeValue(encoder.encode(inputText));
                    setInputText(''); 
                } catch (error) {
                    console.error("Failed to send text", error);
                }
            };

            const sendCommand = async (cmdValue) => {
                if (!cmdCharRef.current) return;
                try {
                    const encoder = new TextEncoder();
                    await cmdCharRef.current.writeValue(encoder.encode(cmdValue.toString()));
                } catch (error) {
                    console.error("Failed to send command", error);
                }
            };

            // --- IMAGE CHUNKING LOGIC ---
            const handleImageUpload = async (event) => {
                const file = event.target.files[0];
                if (!file || !imgCharRef.current) return;

                setIsUploading(true);

                try {
                    // 1. Send Command 8 to prep the screen's memory window
                    await sendCommand(8);
                    await new Promise(r => setTimeout(r, 100)); // Let the screen clear to black

                    // 2. Load into HTML5 Canvas to force 240x240 resizing
                    const img = new Image();
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = 240; 
                    canvas.height = 240;

                    img.onload = async () => {
                        // Draw image to canvas, extracting raw pixel data
                        ctx.drawImage(img, 0, 0, 240, 240);
                        const imageData = ctx.getImageData(0, 0, 240, 240).data;
                        
                        // 3. Convert RGBA to RGB565 (16-bit color for the GC9A01)
                        const rgb565Data = new Uint8Array(240 * 240 * 2);
                        let ptr = 0;
                        for (let i = 0; i < imageData.length; i += 4) {
                            const r = imageData[i] >> 3;
                            const g = imageData[i + 1] >> 2;
                            const b = imageData[i + 2] >> 3;
                            const rgb = (r << 11) | (g << 5) | b;
                            
                            // High byte first, Low byte second (swap bytes)
                            rgb565Data[ptr++] = rgb >> 8;
                            rgb565Data[ptr++] = rgb & 0xFF;
                        }

                        // 4. Stream data over BLE in 256-byte chunks to fit MTU
                        for (let i = 0; i < rgb565Data.length; i += 256) {
                            const chunk = rgb565Data.slice(i, i + 256);
                            await imgCharRef.current.writeValue(chunk);
                            // Brief 10ms pause to let the ESP32 push it to the screen buffer
                            await new Promise(r => setTimeout(r, 10)); 
                        }
                        
                        setIsUploading(false);
                        event.target.value = null; // Reset input so same file can be clicked again
                    };
                    img.src = URL.createObjectURL(file);
                } catch (error) {
                    console.error("Image upload failed", error);
                    setIsUploading(false);
                    event.target.value = null;
                }
            };

            // --- UI Helpers ---
            const isConnected = connectionStatus === 'CONNECTED';
            
            const statusStyles = {
                'DISCONNECTED': { color: 'bg-red-500', shadow: 'shadow-[0_0_15px_rgba(239,68,68,0.8)]', text: 'DISCONNECTED' },
                'CONNECTING': { color: 'bg-yellow-500', shadow: 'shadow-[0_0_15px_rgba(234,179,8,0.8)]', text: 'CONNECTING...', extra: 'animate-pulse' },
                'CONNECTED': { color: 'bg-cyan-400', shadow: 'shadow-[0_0_15px_rgba(34,211,238,0.8)]', text: 'LINK ESTABLISHED' },
            };

            const currentStatus = statusStyles[connectionStatus];

            return (
                <div className="min-h-screen text-[#ededed] font-sans flex flex-col items-center p-6 selection:bg-cyan-500 selection:text-white">
                    
                    {/* Header */}
                    <header className="w-full max-w-md text-center mt-8 mb-10">
                        <h1 className="text-3xl font-bold tracking-widest text-white uppercase flex items-center justify-center gap-3">
                            <Activity className="text-cyan-400" size={28} />
                            Maximalist
                        </h1>
                        <p className="text-cyan-400 font-mono text-sm tracking-[0.3em] mt-1">SYSTEM_PORTAL</p>
                    </header>

                    <main className="w-full max-w-md space-y-6 pb-12">
                        
                        {/* Connection Status Panel */}
                        <div className="bg-[#1e1e1e]/60 backdrop-blur-md border border-white/10 rounded-2xl p-6 flex flex-col items-center shadow-xl">
                            <div className={`w-4 h-4 rounded-full ${currentStatus.color} ${currentStatus.shadow} ${currentStatus.extra || ''} mb-4 transition-all duration-300`}></div>
                            <p className="text-sm font-mono text-gray-400 mb-4">{currentStatus.text}</p>
                            
                            {!isConnected ? (
                                <button 
                                    onClick={connectBLE}
                                    disabled={connectionStatus === 'CONNECTING'}
                                    className="w-full bg-cyan-600 hover:bg-cyan-500 disabled:bg-cyan-800 disabled:cursor-not-allowed text-white font-bold py-3 px-4 rounded-xl transition-all shadow-[0_0_20px_rgba(8,145,178,0.4)] uppercase tracking-wider flex items-center justify-center gap-2"
                                >
                                    <Bluetooth size={20} />
                                    Establish Link
                                </button>
                            ) : (
                                <button 
                                    onClick={disconnectBLE}
                                    className="w-full bg-red-900/50 hover:bg-red-800/50 border border-red-500/30 text-red-200 font-bold py-3 px-4 rounded-xl transition-all uppercase tracking-wider flex items-center justify-center gap-2 mt-2"
                                >
                                    <BluetoothOff size={20} />
                                    Sever Link
                                </button>
                            )}
                        </div>

                        {/* Controls Panel */}
                        <div className={`space-y-6 transition-all duration-500 ${!isConnected ? 'opacity-30 pointer-events-none grayscale' : 'opacity-100'}`}>
                            
                            {/* Face Selector - Companion Matrix */}
                            <div className="bg-[#1e1e1e]/60 backdrop-blur-md border border-white/10 rounded-2xl p-6 shadow-xl">
                                <h2 className="text-xs font-mono text-cyan-400 mb-4 uppercase tracking-widest flex items-center gap-2">
                                    <Activity size={14} /> Companion Matrix
                                </h2>
                                <div className="grid grid-cols-3 gap-3">
                                    <button onClick={() => sendCommand(0)} className="bg-gray-800/80 hover:bg-gray-700 border border-transparent hover:border-cyan-500 rounded-xl py-4 flex flex-col items-center gap-2 transition-all group">
                                        <FaceNeutral className="text-cyan-400 group-hover:scale-110 transition-transform" size={28} />
                                        <span className="text-[10px] font-mono text-gray-300 group-hover:text-white">NEUTRAL</span>
                                    </button>
                                    
                                    <button onClick={() => sendCommand(1)} className="bg-gray-800/80 hover:bg-gray-700 border border-transparent hover:border-cyan-500 rounded-xl py-4 flex flex-col items-center gap-2 transition-all group">
                                        <FaceHappy className="text-cyan-400 group-hover:scale-110 transition-transform" size={28} />
                                        <span className="text-[10px] font-mono text-gray-300 group-hover:text-white">HAPPY</span>
                                    </button>
                                    
                                    <button onClick={() => sendCommand(2)} className="bg-gray-800/80 hover:bg-gray-700 border border-transparent hover:border-gray-400 rounded-xl py-4 flex flex-col items-center gap-2 transition-all group">
                                        <FaceSleepy className="text-gray-400 group-hover:scale-110 transition-transform" size={28} />
                                        <span className="text-[10px] font-mono text-gray-300 group-hover:text-white">REST</span>
                                    </button>

                                    <button onClick={() => sendCommand(3)} className="bg-gray-800/80 hover:bg-gray-700 border border-transparent hover:border-red-500 rounded-xl py-4 flex flex-col items-center gap-2 transition-all group">
                                        <FaceAngry className="text-red-500 group-hover:scale-110 transition-transform" size={28} />
                                        <span className="text-[10px] font-mono text-gray-300 group-hover:text-white">ANGRY</span>
                                    </button>

                                    <button onClick={() => sendCommand(4)} className="bg-gray-800/80 hover:bg-gray-700 border border-transparent hover:border-magenta-500 rounded-xl py-4 flex flex-col items-center gap-2 transition-all group">
                                        <FaceVisor className="text-magenta-500 group-hover:scale-110 transition-transform" size={28} />
                                        <span className="text-[10px] font-mono text-gray-300 group-hover:text-white">VISOR</span>
                                    </button>

                                    <button onClick={() => sendCommand(5)} className="bg-gray-800/80 hover:bg-gray-700 border border-transparent hover:border-cyan-500 rounded-xl py-4 flex flex-col items-center gap-2 transition-all group">
                                        <FaceOptics className="text-cyan-400 group-hover:scale-110 transition-transform" size={28} />
                                        <span className="text-[10px] font-mono text-gray-300 group-hover:text-white">OPTICS</span>
                                    </button>
                                </div>

                                {/* Custom Image Stream Injection */}
                                <div className="mt-3">
                                    <input 
                                        type="file" 
                                        accept="image/png, image/jpeg, image/jpg" 
                                        ref={fileInputRef} 
                                        className="hidden" 
                                        onChange={handleImageUpload} 
                                    />
                                    <button 
                                        onClick={() => fileInputRef.current.click()} 
                                        disabled={isUploading}
                                        className={`w-full bg-gray-800/80 hover:bg-gray-700 border border-transparent ${isUploading ? 'border-green-500 opacity-70' : 'hover:border-green-500'} rounded-xl py-4 flex items-center justify-center gap-3 transition-all group`}
                                    >
                                        <ImageUploadIcon className={`${isUploading ? 'text-green-500 animate-pulse' : 'text-green-400 group-hover:scale-110'} transition-transform`} size={20} />
                                        <span className="text-xs font-mono text-gray-300 group-hover:text-white">
                                            {isUploading ? 'STREAMING...' : 'STREAM CUSTOM IMAGE'}
                                        </span>
                                    </button>
                                </div>
                            </div>

                            {/* System Modules */}
                            <div className="bg-[#1e1e1e]/60 backdrop-blur-md border border-white/10 rounded-2xl p-6 shadow-xl">
                                <h2 className="text-xs font-mono text-cyan-400 mb-4 uppercase tracking-widest flex items-center gap-2">
                                    <Cpu size={14} /> System Modules
                                </h2>
                                
                                {/* 7: Telemetry */}
                                <button onClick={() => sendCommand(7)} className="w-full mb-4 bg-gray-800/80 hover:bg-gray-700 border border-transparent hover:border-orange-500 rounded-xl py-4 flex items-center justify-center gap-3 transition-all group">
                                    <Cpu className="text-orange-400 group-hover:scale-110 transition-transform" size={20} />
                                    <span className="text-xs font-mono text-gray-300 group-hover:text-white">LAUNCH TELEMETRY DASHBOARD</span>
                                </button>

                                {/* 6: Push Message */}
                                <div className="flex gap-2">
                                    <input 
                                        type="text" 
                                        maxLength="24" 
                                        value={inputText}
                                        onChange={(e) => setInputText(e.target.value)}
                                        onKeyDown={(e) => e.key === 'Enter' && sendText()}
                                        placeholder="Enter custom text..." 
                                        className="w-full bg-black/50 border border-gray-700 rounded-xl px-4 py-3 focus:outline-none focus:border-magenta-500 text-white placeholder-gray-600 font-mono"
                                    />
                                    <button 
                                        onClick={sendText}
                                        className="bg-gray-800 hover:bg-gray-700 text-white px-5 rounded-xl transition-all flex items-center justify-center border border-gray-700 hover:border-magenta-500"
                                    >
                                        <Send size={20} />
                                    </button>
                                </div>
                            </div>

                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
