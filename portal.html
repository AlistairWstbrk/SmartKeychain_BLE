<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maximalist Labs Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { overscroll-behavior-y: contain; }
        /* Custom styling for the color input */
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 8px; }
    </style>
</head>
<body class="bg-[#050505]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        // --- Icons ---
        const Activity = ({ size, className }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>;
        const Bluetooth = ({ size, className }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m7 7 10 10-5 5V2l5 5-10 10"/></svg>;
        const BluetoothOff = ({ size, className }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m17 17-5 5V12l-5 5"/><path d="m2 2 20 20"/><path d="M14.5 9.5 12 7V2l5 5-2.5 2.5"/></svg>;
        const Send = ({ size, className }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>;
        const Cpu = ({ size, className }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="16" height="16" x="4" y="4" rx="2"/><rect width="6" height="6" x="9" y="9" rx="1"/><path d="M15 2v2"/><path d="M15 20v2"/><path d="M2 15h2"/><path d="M2 9h2"/><path d="M20 15h2"/><path d="M20 9h2"/><path d="M9 2v2"/><path d="M9 20v2"/></svg>;
        const ImageUploadIcon = ({ size, className }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>;
        const PenTool = ({ size, className }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.58 7.58"/><circle cx="11" cy="11" r="2"/></svg>;
        const Eraser = ({ size, className }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"/><path d="M22 21H7"/><path d="m5 11 9 9"/></svg>;
        const PaintBucket = ({ size, className }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m19 11-8-8-8.6 8.6a2 2 0 0 0 0 2.8l5.2 5.2c.8.8 2 .8 2.8 0L19 11Z"/><path d="m5 2 5 5"/><path d="M2 13h15"/><path d="M22 20a2 2 0 1 1-4 0c0-1.6 1.7-2.4 2-4 .3 1.6 2 2.4 2 4Z"/></svg>;
        
        // --- Emotion Icons ---
        const FaceNeutral = ({ size, className }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 9h.01M16 9h.01M8 15h8"/></svg>;
        const FaceHappy = ({ size, className }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 9l1-1 1 1M16 9l-1-1-1 1M8 14s1.5 2 4 2 4-2 4-2"/></svg>;
        const FaceSleepy = ({ size, className }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>;
        const FaceAngry = ({ size, className }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 9l2 1M16 9l-2 1M8 15h8"/></svg>;
        const FaceVisor = ({ size, className }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="8" width="18" height="8" rx="2"/><circle cx="12" cy="12" r="2"/></svg>;
        const FaceOptics = ({ size, className }) => <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/><path d="M12 2v20M2 12h20"/></svg>;

        // --- BLE Settings ---
        const SERVICE_UUID = "19b10000-e8f2-537e-4f6c-d104768a1214";
        const CHAR_TEXT_UUID = "19b10001-e8f2-537e-4f6c-d104768a1214";
        const CHAR_CMD_UUID  = "19b10002-e8f2-537e-4f6c-d104768a1214";
        const CHAR_IMG_UUID  = "19b10003-e8f2-537e-4f6c-d104768a1214"; 
        const CHAR_RENAME_UUID = "19b10004-e8f2-537e-4f6c-d104768a1214";
        const CHAR_COLOR_UUID = "19b10005-e8f2-537e-4f6c-d104768a1214"; // New Color Channel

        function App() {
            const [connectionStatus, setConnectionStatus] = useState('DISCONNECTED'); 
            const [inputText, setInputText] = useState('');
            const [isUploading, setIsUploading] = useState(false);
            const [newDeviceName, setNewDeviceName] = useState('');
            
            // Canvas & Aura State
            const [brushColor, setBrushColor] = useState('#22d3ee'); 
            const [auraColor, setAuraColor] = useState('#22d3ee'); 
            const canvasRef = useRef(null);
            const isDrawing = useRef(false);
            
            const bleDeviceRef = useRef(null);
            const textCharRef = useRef(null);
            const cmdCharRef = useRef(null);
            const imgCharRef = useRef(null);
            const renameCharRef = useRef(null);
            const colorCharRef = useRef(null);
            const fileInputRef = useRef(null);

            useEffect(() => {
                if (canvasRef.current) {
                    const ctx = canvasRef.current.getContext('2d');
                    ctx.fillStyle = '#000000';
                    ctx.fillRect(0, 0, 240, 240);
                }
            }, []);

            // --- BLE Logic ---
            const handleDisconnect = () => {
                setConnectionStatus('DISCONNECTED');
                bleDeviceRef.current = null;
            };

            const connectBLE = async () => {
                try {
                    setConnectionStatus('CONNECTING');
                    
                    const device = await navigator.bluetooth.requestDevice({
                        acceptAllDevices: true,
                        optionalServices: [SERVICE_UUID]
                    });

                    device.addEventListener('gattserverdisconnected', handleDisconnect);
                    bleDeviceRef.current = device;

                    const server = await device.gatt.connect();
                    const service = await server.getPrimaryService(SERVICE_UUID);
                    
                    textCharRef.current = await service.getCharacteristic(CHAR_TEXT_UUID);
                    cmdCharRef.current = await service.getCharacteristic(CHAR_CMD_UUID);
                    imgCharRef.current = await service.getCharacteristic(CHAR_IMG_UUID);
                    renameCharRef.current = await service.getCharacteristic(CHAR_RENAME_UUID);
                    colorCharRef.current = await service.getCharacteristic(CHAR_COLOR_UUID);

                    setConnectionStatus('CONNECTED');
                } catch (error) {
                    console.error("Connection failed!", error);
                    setConnectionStatus('DISCONNECTED');
                }
            };

            const disconnectBLE = () => {
                if (bleDeviceRef.current?.gatt.connected) bleDeviceRef.current.gatt.disconnect();
            };

            const sendCommand = async (cmdValue) => {
                if (!cmdCharRef.current) return;
                try {
                    const encoder = new TextEncoder();
                    await cmdCharRef.current.writeValue(encoder.encode(cmdValue.toString()));
                } catch (error) {}
            };

            const sendText = async () => {
                if (!textCharRef.current || !inputText) return;
                try {
                    const encoder = new TextEncoder();
                    await textCharRef.current.writeValue(encoder.encode(inputText));
                    setInputText(''); 
                } catch (error) {}
            };

            const renameDevice = async () => {
                if (!renameCharRef.current || !newDeviceName) return;
                try {
                    const encoder = new TextEncoder();
                    await renameCharRef.current.writeValue(encoder.encode(newDeviceName.trim().toUpperCase()));
                    setNewDeviceName('');
                } catch (error) {}
            };

            const applyAuraColor = async () => {
                if (!colorCharRef.current) return;
                try {
                    // Convert Hex to 3 RGB bytes
                    const r = parseInt(auraColor.slice(1, 3), 16);
                    const g = parseInt(auraColor.slice(3, 5), 16);
                    const b = parseInt(auraColor.slice(5, 7), 16);
                    const data = new Uint8Array([r, g, b]);
                    await colorCharRef.current.writeValue(data);
                } catch (error) { console.error("Color failed", error); }
            };

            // --- High-Speed Image/Canvas Streamer ---
            const streamToKeychain = async (sourceCanvas) => {
                if (!imgCharRef.current) return;
                setIsUploading(true);

                try {
                    await sendCommand(8); 
                    await new Promise(r => setTimeout(r, 50)); 

                    const ctx = sourceCanvas.getContext('2d');
                    const imageData = ctx.getImageData(0, 0, 240, 240).data;
                    
                    const rgb565Data = new Uint8Array(240 * 240 * 2);
                    let ptr = 0;
                    for (let i = 0; i < imageData.length; i += 4) {
                        const r = imageData[i] >> 3;
                        const g = imageData[i + 1] >> 2;
                        const b = imageData[i + 2] >> 3;
                        const rgb = (r << 11) | (g << 5) | b;
                        rgb565Data[ptr++] = rgb >> 8;
                        rgb565Data[ptr++] = rgb & 0xFF;
                    }

                    for (let i = 0; i < rgb565Data.length; i += 500) {
                        const chunk = rgb565Data.slice(i, i + 500);
                        await imgCharRef.current.writeValue(chunk);
                        await new Promise(r => setTimeout(r, 5)); 
                    }
                } catch (error) {
                    console.error("Stream failed", error);
                }
                setIsUploading(false);
            };

            const handleImageUpload = (event) => {
                const file = event.target.files[0];
                if (!file) return;

                const img = new Image();
                const hiddenCanvas = document.createElement('canvas');
                const ctx = hiddenCanvas.getContext('2d');
                hiddenCanvas.width = 240; hiddenCanvas.height = 240;

                img.onload = () => {
                    ctx.drawImage(img, 0, 0, 240, 240);
                    streamToKeychain(hiddenCanvas);
                    event.target.value = null; 
                };
                img.src = URL.createObjectURL(file);
            };

            // --- Canvas Drawing Logic ---
            const startDrawing = (e) => {
                isDrawing.current = true;
                draw(e);
            };

            const stopDrawing = () => {
                isDrawing.current = false;
                const ctx = canvasRef.current.getContext('2d');
                ctx.beginPath();
            };

            const draw = (e) => {
                if (!isDrawing.current) return;
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                
                const x = (clientX - rect.left) * scaleX;
                const y = (clientY - rect.top) * scaleY;

                ctx.lineWidth = brushColor === '#000000' ? 20 : 8; 
                ctx.lineCap = 'round';
                ctx.strokeStyle = brushColor;

                ctx.lineTo(x, y);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(x, y);
            };

            const clearCanvas = () => {
                const ctx = canvasRef.current.getContext('2d');
                ctx.fillStyle = '#000000';
                ctx.fillRect(0, 0, 240, 240);
                ctx.beginPath();
            };

            // --- UI Helpers ---
            const isConnected = connectionStatus === 'CONNECTED';
            const statusStyles = {
                'DISCONNECTED': { color: 'bg-red-500', text: 'DISCONNECTED' },
                'CONNECTING': { color: 'bg-yellow-500', text: 'CONNECTING...', extra: 'animate-pulse' },
                'CONNECTED': { color: 'bg-cyan-400', text: 'LINK ESTABLISHED' },
            };
            const currentStatus = statusStyles[connectionStatus];

            return (
                <div className="min-h-screen text-[#ededed] font-sans flex flex-col items-center p-6 pb-20">
                    
                    <header className="w-full max-w-md text-center mt-4 mb-8">
                        <h1 className="text-3xl font-bold tracking-widest text-white uppercase flex items-center justify-center gap-3">
                            <Activity className="text-cyan-400" size={28} />
                            Maximalist
                        </h1>
                    </header>

                    <main className="w-full max-w-md space-y-6">
                        
                        {/* Status Panel */}
                        <div className="bg-[#1e1e1e]/60 border border-white/10 rounded-2xl p-6 flex flex-col items-center">
                            <div className={`w-4 h-4 rounded-full ${currentStatus.color} ${currentStatus.extra || ''} mb-4`}></div>
                            <p className="text-sm font-mono text-gray-400 mb-4">{currentStatus.text}</p>
                            {!isConnected ? (
                                <button onClick={connectBLE} disabled={connectionStatus === 'CONNECTING'} className="w-full bg-cyan-600 font-bold py-3 px-4 rounded-xl flex items-center justify-center gap-2">
                                    <Bluetooth size={20} /> Establish Link
                                </button>
                            ) : (
                                <button onClick={disconnectBLE} className="w-full bg-red-900/50 text-red-200 font-bold py-3 px-4 rounded-xl flex items-center justify-center gap-2">
                                    <BluetoothOff size={20} /> Sever Link
                                </button>
                            )}
                        </div>

                        <div className={`space-y-6 transition-all duration-500 ${!isConnected ? 'opacity-30 pointer-events-none grayscale' : 'opacity-100'}`}>
                            
                            {/* Theme & Aura Setup */}
                            <div className="bg-[#1e1e1e]/60 border border-white/10 rounded-2xl p-6">
                                <h2 className="text-xs font-mono text-cyan-400 mb-4 uppercase flex items-center gap-2"><PaintBucket size={14} /> Aura Configuration</h2>
                                <div className="flex gap-3 mb-4 items-center">
                                    <input 
                                        type="color" 
                                        value={auraColor}
                                        onChange={(e) => setAuraColor(e.target.value)}
                                        className="w-12 h-12 rounded-lg bg-black border border-gray-700 cursor-pointer"
                                    />
                                    <button 
                                        onClick={applyAuraColor}
                                        className="w-full bg-gray-800 hover:bg-gray-700 text-white font-bold py-3 px-4 rounded-xl transition-all border border-gray-700 hover:border-cyan-500 text-xs tracking-wider"
                                    >
                                        APPLY TO MATRIX RING
                                    </button>
                                </div>
                                <button onClick={() => sendCommand(9)} className="w-full bg-gray-800/80 hover:bg-gray-700 rounded-xl py-3 flex items-center justify-center gap-2 border border-transparent hover:border-gray-500 transition-all">
                                    <div className="w-4 h-4 rounded-full" style={{backgroundColor: auraColor}}></div>
                                    <span className="text-xs font-mono text-gray-300">LAUNCH SOLID AURA SCREEN</span>
                                </button>
                            </div>

                            {/* System Faces */}
                            <div className="bg-[#1e1e1e]/60 border border-white/10 rounded-2xl p-6">
                                <h2 className="text-xs font-mono text-cyan-400 mb-4 uppercase flex items-center gap-2"><Activity size={14} /> Matrix</h2>
                                <div className="grid grid-cols-3 gap-3 mb-4">
                                    <button onClick={() => sendCommand(0)} className="bg-gray-800/80 hover:bg-gray-700 rounded-xl py-3 flex flex-col items-center gap-1"><FaceNeutral className="text-cyan-400" size={24} /><span className="text-[10px]">NEUTRAL</span></button>
                                    <button onClick={() => sendCommand(1)} className="bg-gray-800/80 hover:bg-gray-700 rounded-xl py-3 flex flex-col items-center gap-1"><FaceHappy className="text-cyan-400" size={24} /><span className="text-[10px]">HAPPY</span></button>
                                    <button onClick={() => sendCommand(2)} className="bg-gray-800/80 hover:bg-gray-700 rounded-xl py-3 flex flex-col items-center gap-1"><FaceSleepy className="text-gray-400" size={24} /><span className="text-[10px]">REST</span></button>
                                    <button onClick={() => sendCommand(3)} className="bg-gray-800/80 hover:bg-gray-700 rounded-xl py-3 flex flex-col items-center gap-1"><FaceAngry className="text-red-500" size={24} /><span className="text-[10px]">ANGRY</span></button>
                                    <button onClick={() => sendCommand(4)} className="bg-gray-800/80 hover:bg-gray-700 rounded-xl py-3 flex flex-col items-center gap-1"><FaceVisor className="text-magenta-500" size={24} /><span className="text-[10px]">VISOR</span></button>
                                    <button onClick={() => sendCommand(5)} className="bg-gray-800/80 hover:bg-gray-700 rounded-xl py-3 flex flex-col items-center gap-1"><FaceOptics className="text-cyan-400" size={24} /><span className="text-[10px]">OPTICS</span></button>
                                </div>
                                <button onClick={() => sendCommand(7)} className="w-full bg-gray-800/80 hover:bg-gray-700 rounded-xl py-3 flex items-center justify-center gap-2"><Cpu className="text-orange-400" size={18} /><span className="text-xs">TELEMETRY</span></button>
                            </div>

                            {/* Canvas Module */}
                            <div className="bg-[#1e1e1e]/60 border border-white/10 rounded-2xl p-6">
                                <h2 className="text-xs font-mono text-cyan-400 mb-4 uppercase flex items-center gap-2"><PenTool size={14} /> Draw Module</h2>
                                
                                <div className="flex justify-center mb-4">
                                    <canvas 
                                        ref={canvasRef}
                                        width={240} 
                                        height={240}
                                        className="bg-black rounded-full border-4 border-gray-800 cursor-crosshair touch-none"
                                        onPointerDown={startDrawing}
                                        onPointerMove={draw}
                                        onPointerUp={stopDrawing}
                                        onPointerOut={stopDrawing}
                                    />
                                </div>

                                <div className="flex justify-between items-center bg-gray-900 p-3 rounded-xl mb-4">
                                    <div className="flex gap-2">
                                        <button onClick={() => setBrushColor('#22d3ee')} className={`w-8 h-8 rounded-full bg-[#22d3ee] border-2 ${brushColor === '#22d3ee' ? 'border-white' : 'border-transparent'}`}></button>
                                        <button onClick={() => setBrushColor('#d946ef')} className={`w-8 h-8 rounded-full bg-[#d946ef] border-2 ${brushColor === '#d946ef' ? 'border-white' : 'border-transparent'}`}></button>
                                        <button onClick={() => setBrushColor('#ffffff')} className={`w-8 h-8 rounded-full bg-[#ffffff] border-2 ${brushColor === '#ffffff' ? 'border-gray-500' : 'border-transparent'}`}></button>
                                        <button onClick={() => setBrushColor('#ef4444')} className={`w-8 h-8 rounded-full bg-[#ef4444] border-2 ${brushColor === '#ef4444' ? 'border-white' : 'border-transparent'}`}></button>
                                    </div>
                                    <div className="flex gap-2">
                                        <button onClick={() => setBrushColor('#000000')} className={`p-2 rounded-lg bg-gray-800 ${brushColor === '#000000' ? 'text-white' : 'text-gray-400'}`}><Eraser size={18} /></button>
                                        <button onClick={clearCanvas} className="p-2 text-red-400 text-xs font-bold bg-red-900/30 rounded-lg">CLEAR</button>
                                    </div>
                                </div>

                                <button 
                                    onClick={() => streamToKeychain(canvasRef.current)} 
                                    disabled={isUploading}
                                    className="w-full bg-cyan-900/50 border border-cyan-500 text-cyan-400 rounded-xl py-3 flex items-center justify-center gap-2"
                                >
                                    <Send size={18} /> {isUploading ? 'STREAMING...' : 'PUSH CANVAS TO SCREEN'}
                                </button>
                                
                                <div className="mt-4 pt-4 border-t border-white/10">
                                    <input type="file" accept="image/*" ref={fileInputRef} className="hidden" onChange={handleImageUpload} />
                                    <button onClick={() => fileInputRef.current.click()} className="w-full bg-gray-800 text-gray-300 rounded-xl py-3 flex items-center justify-center gap-2">
                                        <ImageUploadIcon size={18} /> UPLOAD PHOTO
                                    </button>
                                </div>
                            </div>
                            
                            {/* Device Configuration */}
                            <div className="bg-[#1e1e1e]/60 border border-white/10 rounded-2xl p-6">
                                <h3 className="text-[10px] font-mono text-gray-400 mb-3 uppercase tracking-widest">System Configuration</h3>
                                <div className="flex gap-2 mb-4">
                                    <input 
                                        type="text" 
                                        maxLength="16" 
                                        value={newDeviceName}
                                        onChange={(e) => setNewDeviceName(e.target.value)}
                                        placeholder="RENAME DEVICE..." 
                                        className="w-full bg-black/50 border border-gray-700 rounded-xl px-4 py-3 focus:outline-none focus:border-cyan-500 text-white placeholder-gray-600 font-mono text-sm uppercase"
                                    />
                                    <button 
                                        onClick={renameDevice}
                                        className="bg-gray-800 hover:bg-cyan-900 text-cyan-400 font-bold px-4 rounded-xl transition-all border border-gray-700 hover:border-cyan-500 text-xs"
                                    >
                                        APPLY
                                    </button>
                                </div>
                                <div className="flex gap-2 border-t border-white/10 pt-4 mt-2">
                                    <input 
                                        type="text" 
                                        maxLength="24" 
                                        value={inputText}
                                        onChange={(e) => setInputText(e.target.value)}
                                        onKeyDown={(e) => e.key === 'Enter' && sendText()}
                                        placeholder="PUSH MESSAGE..." 
                                        className="w-full bg-black/50 border border-gray-700 rounded-xl px-4 py-3 focus:outline-none focus:border-magenta-500 text-white placeholder-gray-600 font-mono text-sm"
                                    />
                                    <button 
                                        onClick={sendText}
                                        className="bg-gray-800 hover:bg-gray-700 text-white px-5 rounded-xl transition-all flex items-center justify-center border border-gray-700 hover:border-magenta-500"
                                    >
                                        <Send size={20} />
                                    </button>
                                </div>
                            </div>

                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
